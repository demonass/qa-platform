version: '3.8'

services:
  # ========================================
  # Redis ç¼“ه­کوœچهٹ،
  # ========================================
  redis:
    image: redis:7.2-alpine
    container_name: qa-platform-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - qa-redis-data:/data
    networks:
      - qa-platform-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: >
      redis-server --appendonly yes
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}

  # ========================================
  # Python Agent وœچهٹ،
  # ========================================
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: qa-platform-agent
    ports:
      - "${AGENT_PORT:-8000}:8000"
    environment:
      # LLM é…چç½®
      - LLM_PROVIDER=${LLM_PROVIDER:-qwen}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - QWEN_API_BASE=${QWEN_API_BASE}
      - QWEN_MODEL=${QWEN_MODEL}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_API_BASE=${DEEPSEEK_API_BASE}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - LOCAL_API_KEY=${LOCAL_API_KEY:-not-needed}
      - LOCAL_API_BASE=${LOCAL_API_BASE}
      - LOCAL_MODEL=${LOCAL_MODEL}
      # Redis ç¼“ه­کé…چç½®
      - REDIS_ENABLED=${REDIS_ENABLED:-false}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_TTL_SECONDS=${REDIS_TTL_SECONDS:-3600}
      # و—¶هŒ؛
      - TZ=${TZ:-Asia/Shanghai}
      # هˆ‌ه§‹ç®،çگ†ه‘ک
      - SEED_ADMIN=${SEED_ADMIN}
    volumes:
      # وŒپن¹…هŒ–و•°وچ®ç›®ه½•
      - qa-data:/app/data
      # و–‡و،£ç›®ه½•ï¼ˆç”¨ن؛ژ RAGï¼‰
      - ./document:/app/document
      # هµŒه…¥و¨،ه‍‹ç›®ه½•
      - ./embedding_models:/app/embedding_models
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - qa-platform-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ========================================
  # Go هگژç«¯وœچهٹ،
  # ========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: qa-platform-backend
    ports:
      - "${BACKEND_PORT:-8081}:8081"
    environment:
      - PORT=8081
      - AGENT_SERVICE_URL=http://agent:8000
      - AUTH_TOKEN=${AUTH_TOKEN}
      - JWT_SECRET=${JWT_SECRET:-qa-platform-default-jwt-secret}
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      agent:
        condition: service_healthy
    networks:
      - qa-platform-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ========================================
  # Next.js ه‰چç«¯وœچهٹ،
  # ========================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: qa-platform-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - VITE_API_URL=http://localhost:${BACKEND_PORT:-8081}
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - qa-platform-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# ========================================
# ç½‘ç»œé…چç½®
# ========================================
networks:
  qa-platform-network:
    driver: bridge

# ========================================
# و•°وچ®هچ·
# ========================================
volumes:
  qa-data:
    driver: local
  qa-redis-data:
    driver: local